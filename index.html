<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرْض السَّــــــــــــــــــــــــوَاد | Ard Al-Sawad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@400;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #ffffff; font-family: 'Amiri', serif; color: #000000; transition: all 0.3s ease; }
        
        /* دعم اللغة الإنجليزية */
        body.lang-en { direction: ltr; text-align: left; font-family: system-ui, sans-serif; }
        
        .site-header { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .brand-name { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.3; }
        .line-top { font-size: 1.4rem; font-weight: 700; }
        .line-bottom { font-size: 2.1rem; font-weight: 700; }
        
        .nav-menu { display: flex; align-items: center; gap: 20px; }
        .nav-link { cursor: pointer; font-size: 1.2rem; padding-bottom: 4px; border-bottom: 2px solid transparent; }
        .nav-link.active { border-bottom: 2px solid #2ecc71; color: #2ecc71; }
        
        .dark-content-section { background-color: #1a1a1a; color: #ffffff; padding: 60px 20px; min-height: 600px; }
        .content-container { max-width: 850px; margin: 0 auto; }
        
        /* البطاقات المتوهجة ذات الحواف الناعمة */
        .blog-grid { display: grid; grid-template-columns: 1fr; gap: 25px; }
        @media (min-width: 769px) { .blog-grid { grid-template-columns: 1fr 1fr; } }
        
        .blog-card {
            background: #222;
            border: 1px solid #333;
            border-radius: 20px; /* حواف ناعمة */
            padding: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
        }
        .blog-card:hover {
            border-color: #2ecc71;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.3); /* تأثير التوهج */
            transform: translateY(-5px);
        }
        
        .lang-switch-btn { background: #fff; border: 1px solid #000; padding: 8px 16px; cursor: pointer; border-radius: 50px; font-weight: bold; }
        body.lang-en .lang-switch-btn { background: #000; color: #fff; }

        .page-view-section { display: none; }
        .page-view-section.active { display: block; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand-name">
            <span class="line-top" id="txt-top">أرْض</span>
            <span class="line-bottom" id="txt-bot">السَّــــــــــــــــــــــــوَاد</span>
        </div>
        <div class="header-controls">
            <nav class="nav-menu">
                <span class="nav-link active" onclick="navigateTo('home')">الرئيسية</span>
                <span class="nav-link" onclick="navigateTo('blog')">المدونة</span>
            </nav>
            <button class="lang-switch-btn" id="lang-btn" onclick="toggleLanguage()">English</button>
        </div>
    </header>

    <main class="dark-content-section">
        <div class="content-container">
            <div id="home-content-area" class="page-view-section active">
                <h1 id="main-title">تنهض رؤيتنا من مفارقة معاصرة</h1>
            </div>

            <div id="blog-content-area" class="page-view-section">
                <div class="blog-grid">
                    <div class="blog-card" onclick="alert('توهج وتفاصيل...')">
                        <h3 style="color: #2ecc71;">البلبل العراقي</h3>
                        <p>تفاصيل البلبل العراقي ومواجهة الاندثار...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function navigateTo(sectionId) {
            document.querySelectorAll('.page-view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId + '-content-area').classList.add('active');
        }

        function toggleLanguage() {
            const body = document.body;
            body.classList.toggle('lang-en');
            const btn = document.getElementById('lang-btn');
            const isEng = body.classList.contains('lang-en');
            
            // تبديل بسيط للنصوص
            document.getElementById('txt-top').innerText = isEng ? "Ard" : "أرْض";
            document.getElementById('txt-bot').innerText = isEng ? "Al-Sawad" : "السَّــــــــــــــــــــــــوَاد";
            document.getElementById('main-title').innerText = isEng ? "Our vision rises from a modern paradox" : "تنهض رؤيتنا من مفارقة معاصرة";
            btn.innerText = isEng ? "العربية" : "English";
        }
    </script>
</body>
</html>
