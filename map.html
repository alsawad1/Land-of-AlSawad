<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --dark: #1a1a1a; --accent: #f76b6b; --gold: #ffcc00; }
        body { background-color: var(--dark); color: white; font-family: 'Amiri', serif; }
        .map-wrapper { max-width: 900px; margin: 40px auto; display: flex; gap: 40px; align-items: flex-start; }
        
        /* الخارطة */
        .svg-map { flex: 1; filter: drop-shadow(0 0 10px rgba(247, 107, 107, 0.2)); }
        .province { fill: #2a2a2a; stroke: #444; stroke-width: 1.5; transition: 0.5s; cursor: pointer; }
        .province:hover { fill: #3a3a3a; stroke: var(--accent); }
        
        /* الدوائر (النقاط) */
        .dot { cursor: pointer; transition: 0.3s; }
        .dot:hover { r: 12; stroke: white; stroke-width: 2; }

        /* اللوحة الجانبية */
        .sidebar { flex: 0 0 300px; padding: 20px; border-right: 2px solid var(--accent); }
        .card { background: #252525; padding: 20px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="map-wrapper">
    <div class="svg-map">
        <svg viewBox="0 0 500 600">
            <path id="baghdad" class="province" d="M200,200 L250,200 L250,250 L200,250 Z" onclick="updateSidebar('بغداد')" />
            <path id="basra" class="province" d="M250,400 L300,400 L300,450 L250,450 Z" onclick="updateSidebar('البصرة')" />
            
            <circle class="dot" cx="225" cy="225" r="8" fill="#ffcc00" onclick="updateSidebar('بغداد')" />
            <circle class="dot" cx="275" cy="425" r="8" fill="#4caf50" onclick="updateSidebar('البصرة')" />
        </svg>
    </div>

    <div class="sidebar">
        <h2>لوحة التحكم البيئية</h2>
        <div id="details" class="card">اضغط على أي محافظة لاستعراض التفاصيل المملة والدقيقة...</div>
    </div>
</div>

<script>
    const db = {
        "بغداد": { 
            "المشروع": "حزام بغداد الأخضر", 
            "النوع": "تحريج استراتيجي", 
            "التكلفة": "تمويل ذاتي", 
            "الحالة": "جاري التنفيذ",
            "الوصف": "مساحات واسعة تعتمد على الألبيزيا لتقليل العواصف الترابية." 
        },
        "البصرة": { 
            "المشروع": "واحة الفاو", 
            "النوع": "زراعة نسيجية", 
            "التكلفة": "دعم مجتمعي", 
            "الحالة": "مكتمل",
            "الوصف": "نظام ري ذكي يعتمد على المياه الرمادية المعالجة." 
        }
    };

    function updateSidebar(city) {
        const data = db[city];
        if(data) {
            document.getElementById('details').innerHTML = `
                <h3>${city}</h3>
                <p><strong>المشروع:</strong> ${data.المشروع}</p>
                <p><strong>الحالة:</strong> ${data.الحالة}</p>
                <p><strong>التفاصيل:</strong> ${data.الوصف}</p>
            `;
        }
    }
</script>

</body>
</html>
